<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio</title>
    <script>
      // GitHub Pages serves this file for any URL it can't find (e.g. /blah, /project).
      // Since the app uses HashRouter, all client-side routes live after the `#`.
      // We redirect /some/path → /#/some/path so React Router can handle it —
      // matching a redirect route (e.g. /project → /projects) or falling through to 404.
      (function () {
        var path = window.location.pathname;
        var search = window.location.search;
        // Avoid redirect loop — root path is served correctly by GH Pages
        if (path !== "/") {
          window.location.replace("/#" + path + search);
        }
      })();
    </script>
  </head>
  <body></body>
</html>
